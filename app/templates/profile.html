{% extends "base.html" %}
{% block content %}
<div class="bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Profile</h2>
    <div class="mb-4">
        <label class="block text-gray-700">Username</label>
        <p class="text-lg">{{ current_user.username }}</p>
    </div>
    <div class="mb-4">
        <label class="block text-gray-700">Email</label>
        <p class="text-lg">{{ current_user.email }}</p>
    </div>
    <div class="mb-4">
        <label class="block text-gray-700">Member since</label>
        <p class="text-lg">{{ current_user.created_at.strftime('%Y-%m-%d') }}</p>
    </div>
    <a href="{{ url_for('auth.change_password') }}" class="inline-block bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Change Password</a>
</div>
{% endblock %}
