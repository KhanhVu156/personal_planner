{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold dark:text-white">Budgets</h2>
    <a href="{{ url_for('budgets.add_budget') }}" class="btn btn-success">Set Budget</a>
</div>

<form method="GET" class="mb-4 flex gap-2">
    <input type="number" name="month" value="{{ month }}" placeholder="Month (1-12)" class="px-3 py-1 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    <input type="number" name="year" value="{{ year }}" placeholder="Year" class="px-3 py-1 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    <button type="submit" class="bg-gray-600 text-white px-3 py-1 rounded hover:bg-gray-700">Filter</button>
</form>

<div class="overflow-x-auto">
    <table class="min-w-full bg-white dark:bg-gray-800 rounded shadow">
        <thead>
            <tr class="bg-gray-200 dark:bg-gray-700">
                <th class="py-2 px-4 dark:text-gray-200">Category</th>
                <th class="py-2 px-4 dark:text-gray-200">Month</th>
                <th class="py-2 px-4 dark:text-gray-200">Year</th>
                <th class="py-2 px-4 dark:text-gray-200">Amount</th>
                <th class="py-2 px-4 dark:text-gray-200">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for budget in budgets %}
            <tr class="border-b border-gray-200 dark:border-gray-700">
                <td class="py-2 px-4 dark:text-gray-300">{{ budget.category }}</td>
                <td class="py-2 px-4 dark:text-gray-300">{{ budget.month }}</td>
                <td class="py-2 px-4 dark:text-gray-300">{{ budget.year }}</td>
                <td class="py-2 px-4 dark:text-gray-300">{{ "%.2f"|format(budget.amount) }}</td>
                <td class="py-2 px-4">
                    <a href="{{ url_for('budgets.add_budget', month=budget.month, year=budget.year, category=budget.category) }}" class="text-blue-600 dark:text-blue-400">Edit</a>
                    <a href="{{ url_for('budgets.delete_budget', id=budget.id) }}" class="delete-confirm text-red-600 dark:text-red-400 ml-2">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
